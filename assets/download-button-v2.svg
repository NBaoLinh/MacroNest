<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 190 40" width="190" height="40">
  <defs>
    <!-- Dark slate gradient for button background -->
    <linearGradient id="btn-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#18181b"/>
      <stop offset="100%" stop-color="#27272a"/>
    </linearGradient>
  </defs>

  <style>
    .btn-text {
      font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, 'Inter', Roboto, sans-serif;
      font-weight: 800;
      font-size: 13px;
      letter-spacing: 1.5px;
      fill: #ffffff;
    }
    .download-icon {
      stroke: #4ade80;
      stroke-width: 3;
      stroke-linecap: round;
      stroke-linejoin: round;
      fill: none;
    }
  </style>

  <!-- Button Background -->
  <rect width="190" height="40" rx="12" fill="url(#btn-bg)" stroke="#3f3f46" stroke-width="1.5"/>

  <!-- Download Icon (centered at cx=26, cy=20) -->
  <g class="download-icon">
    <!-- Down Arrow Shaft and Head -->
    <path d="M 26 10 L 26 24" />
    <path d="M 20 18 L 26 24 L 32 18" />
    <!-- Bottom Tray -->
    <path d="M 17 30 L 35 30" />
  </g>

  <!-- "DOWNLOAD EXE" Text -->
  <text x="46" y="25" class="btn-text">DOWNLOAD EXE</text>
</svg>

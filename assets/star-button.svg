<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 190 40" width="190" height="40">
  <defs>
    <!-- Background Gradient matching the app icon and banner -->
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#052e16"/>
      <stop offset="100%" stop-color="#22c55e"/>
    </linearGradient>
    
    <!-- Gold/Yellow Gradient for the star -->
    <linearGradient id="gold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffdf00"/>
      <stop offset="100%" stop-color="#d4af37"/>
    </linearGradient>
  </defs>

  <style>
    .btn-text {
      font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, 'Inter', Roboto, sans-serif;
      font-weight: 800;
      font-size: 13px;
      letter-spacing: 1.5px;
      fill: #ffffff;
    }
    .star-icon {
      fill: url(#gold);
      stroke: #ffffff;
      stroke-width: 1;
      stroke-linejoin: round;
    }
  </style>

  <!-- Button Background -->
  <rect width="190" height="40" rx="12" fill="url(#bg)" stroke="#ffffff" stroke-width="1.5" stroke-opacity="0.25"/>

  <!-- Golden Star Icon (centered vertically at cy=20, cx=26) -->
  <path d="M 26 9 L 29.3 16 L 36.8 17 L 31.2 22 L 32.7 29.5 L 26 25.8 L 19.3 29.5 L 20.8 22 L 15.2 17 L 22.7 16 Z" class="star-icon" />

  <!-- "STAR THIS REPO" Text -->
  <text x="46" y="25" class="btn-text">STAR THIS REPO</text>
</svg>
